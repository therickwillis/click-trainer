{{define "recap"}}
<div id="recap" class="recap-panel">
    <h1>Game Over!</h1>
    <div class="recap-ranking">
        {{range $i, $p := .}}
        <div class="recap-row">
            <div class="recap-row__rank">{{inc $i}}</div>
            <div class="recap-row__dot" style="background-color:{{$p.Color}}"></div>
            <div class="recap-row__name">{{$p.Name}}</div>
            <div class="recap-row__score">{{$p.Score}} pts</div>
        </div>
        {{end}}
    </div>
    <button type="submit" hx-post="/room/play-again" hx-swap="none">Play Again</button>
    <button type="button" hx-post="/room/leave" hx-swap="none" class="btn-ghost">Leave Room</button>
</div>
{{end}}

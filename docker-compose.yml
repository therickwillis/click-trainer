services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clicktrainer_app
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://clicktrainer:clicktrainer@db:5432/clicktrainer?sslmode=disable
      - ROUND_DURATION=60
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "com.docker.compose.service=app"

  db:
    image: postgres:16-alpine
    container_name: clicktrainer_db
    environment:
      - POSTGRES_USER=clicktrainer
      - POSTGRES_PASSWORD=clicktrainer
      - POSTGRES_DB=clicktrainer
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clicktrainer"]
      interval: 5s
      timeout: 3s
      retries: 5
    labels:
      - "com.docker.compose.service=db"

  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: clicktrainer_prometheus
    profiles: [monitoring]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3
    labels:
      - "com.docker.compose.service=prometheus"

  loki:
    image: grafana/loki:3.0.0
    user: "0"
    container_name: clicktrainer_loki
    profiles: [monitoring]
    ports:
      - "3100:3100"
    volumes:
      - ./monitoring/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki_data:/tmp/loki
    command: -config.file=/etc/loki/loki-config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.docker.compose.service=loki"

  promtail:
    image: grafana/promtail:3.0.0
    container_name: clicktrainer_promtail
    profiles: [monitoring]
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/promtail-config.yml
    depends_on:
      loki:
        condition: service_healthy
    labels:
      - "com.docker.compose.service=promtail"

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: clicktrainer_cadvisor
    profiles: [monitoring]
    ports:
      - "8081:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    labels:
      - "com.docker.compose.service=cadvisor"

  grafana:
    image: grafana/grafana:10.4.2
    container_name: clicktrainer_grafana
    profiles: [monitoring]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=clicktrainer
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    labels:
      - "com.docker.compose.service=grafana"

volumes:
  pgdata:
  prometheus_data:
  loki_data:
  grafana_data:
